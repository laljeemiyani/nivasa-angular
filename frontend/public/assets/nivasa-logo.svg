<svg width="260" height="88" viewBox="0 0 260 88" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#49A6D8"/>
      <stop offset="100%" stop-color="#0D6490"/>
    </linearGradient>
    <linearGradient id="hillGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0F80B5"/>
      <stop offset="100%" stop-color="#0A5C8A"/>
    </linearGradient>
  </defs>

  <!-- Circular emblem -->
  <g transform="translate(0 0)">
    <circle cx="44" cy="44" r="40" fill="url(#bgGradient)"/>
    <path d="M4 46C14 40 26 37 44 37C62 37 74 40 84 46V75H4V46Z" fill="url(#hillGradient)"/>

    <!-- Buildings -->
    <rect x="24" y="20" width="12" height="26" rx="2" fill="#0C4A6E"/>
    <rect x="40" y="14" width="16" height="34" rx="2" fill="#073A58"/>
    <rect x="60" y="22" width="12" height="24" rx="2" fill="#0A5D8B"/>

    <!-- Windows -->
    <g fill="#85C6EF">
      <rect x="27" y="24" width="2.5" height="3.5" rx="0.5"/>
      <rect x="32.5" y="24" width="2.5" height="3.5" rx="0.5"/>
      <rect x="27" y="30" width="2.5" height="3.5" rx="0.5"/>
      <rect x="32.5" y="30" width="2.5" height="3.5" rx="0.5"/>

      <rect x="43" y="18" width="3" height="4.5" rx="0.5"/>
      <rect x="50" y="18" width="3" height="4.5" rx="0.5"/>
      <rect x="43" y="25" width="3" height="4.5" rx="0.5"/>
      <rect x="50" y="25" width="3" height="4.5" rx="0.5"/>
      <rect x="43" y="32" width="3" height="4.5" rx="0.5"/>
      <rect x="50" y="32" width="3" height="4.5" rx="0.5"/>

      <rect x="63" y="26" width="2.5" height="3.5" rx="0.5"/>
      <rect x="68.5" y="26" width="2.5" height="3.5" rx="0.5"/>
      <rect x="63" y="32" width="2.5" height="3.5" rx="0.5"/>
      <rect x="68.5" y="32" width="2.5" height="3.5" rx="0.5"/>
    </g>

    <!-- House -->
    <path d="M24 60L44 40L64 60H24Z" fill="white"/>
    <rect x="31" y="60" width="26" height="16" fill="white"/>
    <rect x="42" y="60" width="6" height="12" fill="#0C4A6E" rx="0.5"/>
  </g>

  <!-- Typography -->
  <g transform="translate(96 44)">
    <text x="0" y="0" fill="#0B4C78" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="36" font-weight="700" dominant-baseline="middle">nivasa</text>
  </g>
